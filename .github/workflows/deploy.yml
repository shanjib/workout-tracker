name: Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest tests
        working-directory: frontend
        run: npm run test

      - name: Build Vue app
        working-directory: frontend
        run: npm run build
        env:
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Start PostgreSQL
        run: |
          docker run --name test-db \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=workoutdb \
            -e POSTGRES_USER=postgres \
            -p 5432:5432 \
            -d postgres:16
          # Wait for PostgreSQL to be ready
          until docker exec test-db pg_isready -U postgres; do
            sleep 1
          done

      - name: Generate jOOQ classes
        working-directory: backend
        run: ./gradlew flywayMigrate generateJooq

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy infrastructure and sync frontend
        working-directory: infrastructure
        run: cdk deploy --require-approval never